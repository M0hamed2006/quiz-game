<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌧️ Monster Quiz - ليلة المطر</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Cairo', sans-serif;
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            background: #0a0f1c;
        }

        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(15,23,42,0.75), rgba(45,20,65,0.85), rgba(95,35,85,0.75), rgba(130,55,45,0.55));
            z-index: -2;
        }
        body::after {
            content: '';
            position: absolute;
            inset: 0;
            background: url('https://picsum.photos/id/1015/1920/1080') center/cover;
            opacity: 0.75;
            z-index: -3;
            filter: blur(2px) brightness(0.85);
        }

        .rain {
            position: absolute;
            inset: 0;
            background: linear-gradient(transparent, rgba(165, 243, 252, 0.12));
            background-size: 100% 220%;
            animation: fallingRain 0.75s linear infinite;
            z-index: -1;
            opacity: 0.75;
        }
        @keyframes fallingRain { 0% { background-position: 0 0; } 100% { background-position: 0 220%; } }

        .card {
            width: 96%;
            max-width: 420px;
            padding: 18px 12px;
            border-radius: 22px;
            background: rgba(12, 18, 35, 0.92);
            backdrop-filter: blur(32px);
            box-shadow: 0 0 80px rgba(165, 243, 252, 0.35);
            text-align: center;
            z-index: 10;
        }

        h1 { 
            font-size: 1.95rem; 
            font-weight: 900; 
            background: linear-gradient(90deg, #67e8f9, #c4b5fd, #f472b6, #fb923c); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            margin: 6px 0 10px;
        }
        .monster-icon { 
            font-size: 3.8rem; 
            margin: 6px 0 10px; 
            animation: gentleFloat 6s ease-in-out infinite; 
        }
        @keyframes gentleFloat { 0%,100% { transform: translateY(0) rotate(-3deg); } 50% { transform: translateY(-14px) rotate(3deg); } }

        #timer { 
            font-size: 2.4rem; 
            font-weight: 900; 
            margin: 8px 0; 
        }

        #question {
            max-height: 58vh;
            overflow-y: auto;
            padding-right: 6px;
        }

        .option {
            background: rgba(30, 41, 59, 0.95);
            padding: 11px 14px;
            margin: 5px 0;
            border-radius: 14px;
            cursor: pointer;
            font-size: 0.97rem;
            border: 3px solid transparent;
            min-height: 42px;
            display: flex;
            align-items: center;
        }

        .option:hover, .option:active {
            transform: translateY(-3px);
            border-color: #67e8f9;
        }

        .correct { background: #22c55e !important; }
        .wrong { background: #ef4444 !important; animation: shake 0.4s; }

        button {
            width: 100%; 
            padding: 14px; 
            margin-top: 16px;
            font-size: 1.15rem; 
            font-weight: 800; 
            border: none; 
            border-radius: 18px;
            background: linear-gradient(45deg, #22c55e, #06b6d4, #a78bfa);
            color: white; 
            cursor: pointer;
        }

        /* تعديلات الموبايل الأقوى */
        @media (max-width: 480px) {
            .card {
                padding: 16px 10px;
                width: 97%;
            }
            h1 { font-size: 1.75rem; }
            .monster-icon { font-size: 3.4rem; }
            #timer { font-size: 2.25rem; }
            .option {
                font-size: 0.95rem;
                padding: 10px 12px;
                min-height: 40px;
                margin: 4px 0;
            }
        }
    </style>
</head>
<body>
<div class="rain"></div>

<!-- شاشة الباسورد -->
<div class="card" id="passwordScreen">
    <span class="monster-icon">🌧️🌙</span>
    <h1>Monster Quiz</h1>
    <p style="margin:15px 0 12px; font-size:1.05rem;">ادخل كلمة السر</p>
    <input type="password" id="passwordInput" placeholder="258147"
           style="width:100%; padding:14px; border-radius:14px; border:none; background:rgba(30,41,59,0.9); color:white; text-align:center; font-size:1.05rem;">
    <button onclick="checkPassword()">دخول 🌧️</button>
    <p id="passwordError" style="color:#f87171; margin-top:10px;"></p>
</div>

<!-- شاشة اللعبة -->
<div class="card" id="gameScreen" style="display:none;">
    <span class="monster-icon">🌙🌧️</span>
    <h1>Monster Quiz</h1>
   
    <div id="timer">20</div>
    <div id="bar-container" style="height:10px; background:rgba(255,255,255,0.2); border-radius:9999px; overflow:hidden; margin:10px 0;">
        <div id="bar" style="height:100%; background:linear-gradient(90deg,#22c55e,#a5f3fc); width:100%;"></div>
    </div>
   
    <div id="question"></div>
   
    <button id="confirmBtn">تأكيد الإجابة 🌧️</button>
    <p id="result"></p>
</div>

<script>
const CORRECT_PASSWORD = "258147";

function checkPassword() {
    const input = document.getElementById("passwordInput").value.trim();
    if (input === CORRECT_PASSWORD) {
        document.getElementById("passwordScreen").style.display = "none";
        document.getElementById("gameScreen").style.display = "block";
        loadQuestion();
    } else {
        document.getElementById("passwordError").textContent = "❌ كلمة السر غلط!";
        document.getElementById("passwordInput").value = "";
        setTimeout(() => document.getElementById("passwordError").textContent = "", 2000);
    }
}

let questions = [
    { q: "عاصمة مصر؟", o: ["القاهرة", "الجيزة", "أسوان", "الإسكندرية"], a: "القاهرة" },
    { q: "2 + 2 = ؟", o: ["4", "5", "3", "6"], a: "4" },
    { q: "مين مؤسس فيسبوك؟", o: ["مارك زوكربيرج", "بيل غيتس", "إيلون ماسك", "ستيف جوبز"], a: "مارك زوكربيرج" },
    { q: "أكبر دولة في العالم مساحة؟", o: ["روسيا", "كندا", "الصين", "أمريكا"], a: "روسيا" },
    { q: "ما لون السماء في يوم صافي؟", o: ["أزرق", "أخضر", "أحمر", "أصفر"], a: "أزرق" }
];

let currentQuestion = 0;
let score = 0;
let timeLeft = 20;
let timerInterval;
let selectedAnswer = null;

const questionEl = document.getElementById("question");
const timerEl = document.getElementById("timer");
const barEl = document.getElementById("bar");
const confirmBtn = document.getElementById("confirmBtn");

function loadQuestion() {
    if (currentQuestion >= questions.length) return endGame();
    const q = questions[currentQuestion];
    selectedAnswer = null;
    
    let html = `<h2 style="margin-bottom:16px; font-size:1.1rem; line-height:1.35;">${q.q}</h2>`;
   
    q.o.forEach(opt => {
        html += `<div class="option" onclick="selectOption(this)">${opt}</div>`;
    });
    
    questionEl.innerHTML = html;
    startTimer();
}

window.selectOption = function(el) {
    document.querySelectorAll('.option').forEach(o => o.style.borderColor = 'transparent');
    el.style.borderColor = '#67e8f9';
    selectedAnswer = el.innerText;
};

function startTimer() {
    clearInterval(timerInterval);
    timeLeft = 20;
    timerEl.textContent = timeLeft;
    barEl.style.width = "100%";
    timerInterval = setInterval(() => {
        timeLeft--;
        timerEl.textContent = timeLeft;
        barEl.style.width = (timeLeft * 5) + "%";
        if (timeLeft <= 0) nextQuestion();
    }, 1000);
}

confirmBtn.addEventListener("click", () => {
    if (!selectedAnswer) return;
    nextQuestion();
});

function nextQuestion() {
    clearInterval(timerInterval);
    const q = questions[currentQuestion];
    const isCorrect = selectedAnswer === q.a;

    document.querySelectorAll(".option").forEach(opt => {
        if (opt.innerText === q.a) opt.classList.add("correct");
        else if (opt.innerText === selectedAnswer && !isCorrect) opt.classList.add("wrong");
    });

    if (isCorrect) {
        score++;
        confetti({ particleCount: 150, spread: 70 });
    }

    setTimeout(() => {
        currentQuestion++;
        loadQuestion();
    }, 1200);
}

function endGame() {
    const percent = Math.round((score / questions.length) * 100);
    let msg = percent >= 80 ? "🌧️ أداء أسطوري!" : percent >= 60 ? "👍 كويس" : "💧 حاول تاني";
    
    document.getElementById("gameScreen").innerHTML = `
        <span class="monster-icon">🌧️🌕</span>
        <h1>انتهت اللعبة</h1>
        <h2 style="font-size:2.5rem;">${score}/${questions.length}</h2>
        <p style="font-size:1.6rem;">${percent}%</p>
        <p>${msg}</p>
        <button onclick="location.reload()">العب مرة أخرى</button>
    `;
}
</script>
</body>
</html>
