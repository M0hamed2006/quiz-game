<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌧️ Monster Quiz GOD MODE</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'Cairo',sans-serif;
    color:white;
    height:100vh;
    overflow:hidden;
    background:black;
}

/* 🌅 السماء */
.sky{
    position:absolute;
    inset:0;
    background:linear-gradient(270deg,#0f2027,#2c5364,#ff7e5f,#feb47b,#1a2980,#0f2027);
    background-size:2000% 2000%;
    animation:skyMove 60s ease infinite;
    z-index:-6;
}

/* ☁️ سحاب */
.clouds{
    position:absolute;
    inset:0;
    background:url('https://i.imgur.com/8IuucQZ.png') repeat;
    opacity:0.2;
    animation:clouds 120s linear infinite;
    z-index:-5;
}

/* 🌫️ ضباب */
.fog{
    position:absolute;
    inset:0;
    background:radial-gradient(circle,rgba(255,255,255,0.08),transparent 70%);
    animation:fog 60s linear infinite;
    z-index:-4;
}

/* 🌧️ مطر */
.rain{
    position:absolute;
    inset:0;
    background:repeating-linear-gradient(-20deg,rgba(255,255,255,0.2) 0px,rgba(255,255,255,0.2) 2px,transparent 3px,transparent 8px);
    animation:rain 0.4s linear infinite;
    z-index:-3;
}

/* ✨ نجوم */
.stars{
    position:absolute;
    inset:0;
    background:radial-gradient(white 1px,transparent 1px);
    background-size:4px 4px;
    opacity:0;
    animation:stars 10s infinite alternate;
    z-index:-2;
}

/* ⚡ برق */
.flash{
    position:absolute;
    inset:0;
    background:white;
    opacity:0;
    z-index:-1;
}

/* أنيميشن */
@keyframes skyMove{0%{background-position:0%}50%{background-position:100%}100%{background-position:0%}}
@keyframes clouds{from{background-position:0}to{background-position:2000px}}
@keyframes fog{from{transform:translateX(-10%)}to{transform:translateX(10%)}}
@keyframes rain{from{background-position:0}to{background-position:-300px 600px}}
@keyframes stars{from{opacity:0}to{opacity:0.4}}

/* 💎 كارت */
.card{
    position:relative;
    z-index:10;
    width:90%;
    max-width:420px;
    margin:auto;
    top:50%;
    transform:translateY(-50%);
    background:rgba(10,15,30,0.85);
    backdrop-filter:blur(25px);
    border-radius:25px;
    padding:20px;
    text-align:center;
    box-shadow:0 0 40px rgba(100,200,255,0.3);
}

/* خيارات */
.option{
    background:#1e293b;
    padding:12px;
    margin:8px 0;
    border-radius:12px;
    cursor:pointer;
    transition:0.3s;
}
.option:hover{transform:scale(1.05);box-shadow:0 0 10px #67e8f9}
.correct{background:#22c55e !important;box-shadow:0 0 20px #22c55e}
.wrong{background:#ef4444 !important}

/* زر */
button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:12px;
    background:linear-gradient(45deg,#22c55e,#38bdf8,#a78bfa);
    color:white;
    font-weight:bold;
}

/* اهتزاز */
.shake{animation:shake 0.4s}
@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-5px)}
50%{transform:translateX(5px)}
75%{transform:translateX(-5px)}
100%{transform:translateX(0)}
}
</style>
</head>

<body>

<div class="sky"></div>
<div class="clouds"></div>
<div class="fog"></div>
<div class="rain"></div>
<div class="stars"></div>
<div class="flash" id="flash"></div>

<div class="card" id="card">
<h1>🌧️ Monster Quiz</h1>
<p id="q">اضغط ابدأ</p>
<div id="ans"></div>
<p id="timer"></p>
<button onclick="start()">ابدأ</button>
</div>

<script>
let data=[
{q:"عاصمة مصر؟",o:["القاهرة","الجيزة","أسوان"],a:"القاهرة"},
{q:"2+2؟",o:["4","5","3"],a:"4"}
];

let i=0;
let t;

function start(){
    load();
}

function load(){
    if(i>=data.length){
        q.innerText="خلصت 🔥";
        ans.innerHTML="";
        return;
    }

    let d=data[i];
    q.innerText=d.q;

    let html="";
    d.o.forEach(o=>{
        html+=`<div class="option" onclick="check('${o}',this)">${o}</div>`;
    });
    ans.innerHTML=html;

    startTimer();
}

function startTimer(){
    let time=10;
    timer.innerText="⏳ "+time;

    clearInterval(t);
    t=setInterval(()=>{
        time--;
        timer.innerText="⏳ "+time;
        if(time<=0){next();}
    },1000);
}

function check(val,el){
    clearInterval(t);
    let d=data[i];

    if(val===d.a){
        el.classList.add("correct");
    }else{
        el.classList.add("wrong");
        card.classList.add("shake");
        setTimeout(()=>card.classList.remove("shake"),400);
    }

    setTimeout(next,1200);
}

function next(){
    i++;
    load();
}

/* ⚡ برق */
setInterval(()=>{
    let f=document.getElementById("flash");
    f.style.opacity="0.8";
    setTimeout(()=>f.style.opacity="0",100);
},7000);

/* 🎥 حركة بالماوس */
document.addEventListener("mousemove",e=>{
    let x=(e.clientX/window.innerWidth-0.5)*10;
    let y=(e.clientY/window.innerHeight-0.5)*10;
    document.body.style.transform=`rotateX(${y}deg) rotateY(${x}deg)`;
});
</script>

</body>
</html>
