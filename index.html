<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌧️ Monster Quiz - ليلة المطر</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Cairo', sans-serif;
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            background: #0a0f1c;
        }

        /* خلفية أسطورية هادية ومتحركة */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, 
                #1a0f2e 0%, 
                #2a1b4a 30%, 
                #4a2c5c 50%, 
                #6b3a4a 70%, 
                #9c5f3d 85%, 
                #1a0f2e 100%);
            z-index: -3;
            animation: twilightShift 40s ease infinite alternate;
        }
        body::after {
            content: '';
            position: absolute;
            inset: 0;
            background: url('https://picsum.photos/id/1015/1920/1080') center/cover;
            opacity: 0.65;
            z-index: -4;
            filter: blur(3px) brightness(0.75) saturate(1.3);
            animation: mistDrift 120s linear infinite;
        }

        .rain {
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                transparent 0px,
                transparent 4px,
                rgba(165, 243, 252, 0.15) 5px,
                rgba(165, 243, 252, 0.15) 8px
            );
            background-size: 100% 180px;
            animation: fallingRain 0.9s linear infinite;
            z-index: -2;
            opacity: 0.8;
        }

        @keyframes fallingRain { 0% { background-position: 0 0; } 100% { background-position: 0 180px; } }
        @keyframes twilightShift { from { opacity: 0.95; } to { opacity: 1.08; } }
        @keyframes mistDrift { 0% { background-position: 20% 50%; } 100% { background-position: 80% 50%; } }

        .card {
            width: 96%;
            max-width: 400px;
            padding: 16px 12px;
            border-radius: 24px;
            background: rgba(15, 20, 40, 0.85);
            backdrop-filter: blur(30px);
            box-shadow: 0 0 70px rgba(165, 243, 252, 0.25);
            text-align: center;
            z-index: 10;
        }

        h1 { 
            font-size: 1.85rem; 
            font-weight: 900; 
            background: linear-gradient(90deg, #a5f3fc, #c4b5fd, #f9a8d4, #fed7aa); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            margin: 8px 0 10px;
        }
        .monster-icon { 
            font-size: 3.7rem; 
            margin: 6px 0 8px; 
            animation: gentleFloat 8s ease-in-out infinite; 
        }
        @keyframes gentleFloat { 
            0%, 100% { transform: translateY(0) rotate(-3deg); } 
            50% { transform: translateY(-12px) rotate(3deg); } 
        }

        #timer { 
            font-size: 2.35rem; 
            font-weight: 900; 
            margin: 8px 0; 
            color: #a5f3fc;
        }

        #question {
            max-height: 58vh;
            overflow-y: auto;
            padding-right: 5px;
        }

        .option {
            background: rgba(30, 40, 65, 0.9);
            padding: 10px 12px;
            margin: 5px 0;
            border-radius: 14px;
            cursor: pointer;
            font-size: 0.96rem;
            line-height: 1.3;
            border: 2.5px solid transparent;
            min-height: 42px;
            display: flex;
            align-items: center;
        }

        .option:hover, .option:active {
            border-color: #67e8f9;
            transform: translateY(-2px);
        }

        .correct { background: #22c55e !important; }
        .wrong { background: #ef4444 !important; }

        button {
            width: 100%; 
            padding: 14px; 
            margin-top: 15px;
            font-size: 1.12rem; 
            font-weight: 700; 
            border: none; 
            border-radius: 18px;
            background: linear-gradient(45deg, #22c55e, #38bdf8, #a78bfa);
            color: white; 
            cursor: pointer;
        }

        @media (max-width: 480px) {
            .card {
                padding: 14px 10px;
                width: 97%;
            }
            h1 { font-size: 1.68rem; }
            .monster-icon { font-size: 3.3rem; }
            #timer { font-size: 2.15rem; }
            .option {
                font-size: 0.94rem;
                padding: 9px 11px;
                min-height: 39px;
                margin: 4px 0;
            }
        }
    </style>
</head>
<body>
<div class="rain"></div>

<!-- شاشة الباسورد -->
<div class="card" id="passwordScreen">
    <span class="monster-icon">🌧️🌙</span>
    <h1>Monster Quiz</h1>
    <p style="margin:14px 0 12px; font-size:1.02rem; opacity:0.9;">ادخل كلمة السر</p>
    <input type="password" id="passwordInput" placeholder="258147"
           style="width:100%; padding:13px; border-radius:14px; border:none; background:rgba(30,40,65,0.9); color:white; text-align:center; font-size:1.05rem;">
    <button onclick="checkPassword()">دخول 🌧️</button>
    <p id="passwordError" style="color:#f87171; margin-top:10px; font-size:0.95rem;"></p>
</div>

<!-- شاشة اللعبة -->
<div class="card" id="gameScreen" style="display:none;">
    <span class="monster-icon">🌙🌧️</span>
    <h1>Monster Quiz</h1>
   
    <div id="timer">20</div>
    <div id="bar-container" style="height:9px; background:rgba(255,255,255,0.18); border-radius:9999px; overflow:hidden; margin:10px 0;">
        <div id="bar" style="height:100%; background:linear-gradient(90deg,#67e8f9,#a5f3fc,#c4b5fd); width:100%;"></div>
    </div>
   
    <div id="question"></div>
   
    <button id="confirmBtn">تأكيد الإجابة 🌧️</button>
    <p id="result"></p>
</div>

<script>
const CORRECT_PASSWORD = "258147";

function checkPassword() {
    const input = document.getElementById("passwordInput").value.trim();
    if (input === CORRECT_PASSWORD) {
        document.getElementById("passwordScreen").style.display = "none";
        document.getElementById("gameScreen").style.display = "block";
        loadQuestion();
    } else {
        document.getElementById("passwordError").textContent = "❌ كلمة السر غلط!";
        document.getElementById("passwordInput").value = "";
        setTimeout(() => document.getElementById("passwordError").textContent = "", 2200);
    }
}

let questions = [
    { q: "عاصمة مصر؟", o: ["القاهرة", "الجيزة", "أسوان", "الإسكندرية"], a: "القاهرة" },
    { q: "2 + 2 = ؟", o: ["4", "5", "3", "6"], a: "4" },
    { q: "مين مؤسس فيسبوك؟", o: ["مارك زوكربيرج", "بيل غيتس", "إيلون ماسك", "ستيف جوبز"], a: "مارك زوكربيرج" },
    { q: "أكبر دولة في العالم مساحة؟", o: ["روسيا", "كندا", "الصين", "أمريكا"], a: "روسيا" },
    { q: "ما لون السماء في يوم صافي؟", o: ["أزرق", "أخضر", "أحمر", "أصفر"], a: "أزرق" }
];

let currentQuestion = 0;
let score = 0;
let timeLeft = 20;
let timerInterval;
let selectedAnswer = null;

const questionEl = document.getElementById("question");
const timerEl = document.getElementById("timer");
const barEl = document.getElementById("bar");
const confirmBtn = document.getElementById("confirmBtn");

function loadQuestion() {
    if (currentQuestion >= questions.length) return endGame();
    const q = questions[currentQuestion];
    selectedAnswer = null;
    
    let html = `<h2 style="margin-bottom:14px; font-size:1.08rem; line-height:1.35;">${q.q}</h2>`;
   
    q.o.forEach(opt => {
        html += `<div class="option" onclick="selectOption(this)">${opt}</div>`;
    });
    
    questionEl.innerHTML = html;
    startTimer();
}

window.selectOption = function(el) {
    document.querySelectorAll('.option').forEach(o => o.style.borderColor = 'transparent');
    el.style.borderColor = '#67e8f9';
    selectedAnswer = el.innerText;
};

function startTimer() {
    clearInterval(timerInterval);
    timeLeft = 20;
    timerEl.textContent = timeLeft;
    barEl.style.width = "100%";
    
    timerInterval = setInterval(() => {
        timeLeft--;
        timerEl.textContent = timeLeft;
        barEl.style.width = (timeLeft * 5) + "%";
        if (timeLeft <= 0) nextQuestion();
    }, 1000);
}

confirmBtn.addEventListener("click", () => {
    if (!selectedAnswer) return;
    nextQuestion();
});

function nextQuestion() {
    clearInterval(timerInterval);
    const q = questions[currentQuestion];
    const isCorrect = selectedAnswer === q.a;

    document.querySelectorAll(".option").forEach(opt => {
        if (opt.innerText === q.a) opt.classList.add("correct");
        else if (opt.innerText === selectedAnswer && !isCorrect) opt.classList.add("wrong");
    });

    if (isCorrect) {
        score++;
        confetti({ particleCount: 120, spread: 60, origin: { y: 0.7 } });
    }

    setTimeout(() => {
        currentQuestion++;
        loadQuestion();
    }, 1250);
}

function endGame() {
    const percent = Math.round((score / questions.length) * 100);
    let msg = percent === 100 ? "🌧️✨ أنت أسطورة!" : percent >= 70 ? "🌙 أداء رائع" : "💧 حاول تاني";
    
    document.getElementById("gameScreen").innerHTML = `
        <span class="monster-icon">🌧️🌕</span>
        <h1>انتهت اللعبة</h1>
        <h2 style="font-size:2.4rem; margin:15px 0;">${score}/${questions.length}</h2>
        <p style="font-size:1.6rem;">${percent}%</p>
        <p>${msg}</p>
        <button onclick="location.reload()">العب مرة أخرى</button>
    `;
}
</script>
</body>
</html>
