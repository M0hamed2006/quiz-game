<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌌 MONSTER QUIZ LEGEND</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --glow: #67e8f9;
            --neon-pink: #f472b6;
            --neon-purple: #c084fc;
        }
        
        * { box-sizing: border-box; margin:0; padding:0; }
        
        body {
            font-family: 'Cairo', sans-serif;
            color: white;
            min-height: 100dvh;
            overflow-x: hidden;
            background: #000;
            position: relative;
            -webkit-text-size-adjust: 100%;
        }

        /* خلفية فيديو شفافة */
        #video-container {
            position: fixed;
            inset: 0;
            z-index: -10;
            overflow: hidden;
        }
        #video-container video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 2.5s ease;
        }
        #video-container video.active {
            opacity: 0.75;
        }

        #image-overlay {
            position: fixed;
            inset: 0;
            z-index: -9;
            background-size: cover;
            background-position: center;
            opacity: 0.18;
            transition: opacity 3s;
            mix-blend-mode: screen;
        }

        /* Glassmorphism Card */
        .card, .password-card {
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(30px);
            border: 2px solid rgba(103, 232, 249, 0.4);
            box-shadow: 0 0 80px rgba(103, 232, 249, 0.5);
        }

        #password-screen {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(0, 0, 0, 0.92);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .password-card {
            padding: 45px 30px;
            border-radius: 28px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .card {
            position: relative;
            z-index: 10;
            border-radius: 28px;
            width: min(94%, 480px);
            margin: 15px auto;
            padding: 28px 20px;
        }

        @media (max-width: 600px) {
            .card {
                padding: 20px 14px;
                margin: 10px auto;
                border-radius: 20px;
            }
            .password-card {
                padding: 30px 18px;
            }
            h1 { font-size: 1.8rem !important; }
            #question { font-size: 1.1rem !important; min-height: 70px !important; }
            .option {
                padding: 14px 12px;
                font-size: 1.05rem;
                margin: 8px 0;
                border-radius: 16px;
            }
        }

        h1 {
            font-size: 2.6rem;
            font-weight: 900;
            background: linear-gradient(90deg, #67e8f9, #c084fc, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .option {
            background: rgba(30, 41, 59, 0.85);
            padding: 18px;
            margin: 10px 0;
            border-radius: 18px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.35s ease;
            border: 2px solid transparent;
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }
        .option:hover {
            transform: translateY(-4px) scale(1.03);
            box-shadow: 0 0 25px var(--glow);
        }
        .option.correct { background: #22c55e !important; border-color: #86efac; }
        .option.wrong { background: #ef4444 !important; border-color: #f87171; }

        #timer {
            font-size: 1.65rem;
            font-weight: 900;
            color: #f59e0b;
        }

        .progress {
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 9999px;
            overflow: hidden;
        }
        #progress {
            height: 100%;
            background: linear-gradient(90deg, #67e8f9, #c084fc, #f472b6);
            width: 0%;
            transition: width 0.6s ease;
        }

        button#main-btn, button {

            border: none;
            border-radius: 9999px;
            font-weight: 900;
            padding: 18px;
            font-size: 1.4rem;
            width: 100%;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 0 30px rgba(103,232,249,0.6);
        }

            position: fixed;
            font-size: 2rem;
            pointer-events: none;
            z-index: 9999;
            animation: confetti-fall 4s linear forwards;
        }

        @keyframes confetti-fall {
            to {
                transform: translateY(110vh) rotate(720deg);
                opacity: 0;
            }
        }
    </style>
</head>

    { q: "من رواد النظرية السلوكية ثورانديك؟", options: ["صح", "خطأ"], answer: "صح" },
    { q: "من أهم نظريات التعلم في علم النفس النظرية السلوكية؟", options: ["صح", "خطأ"], answer: "صح" },
    { q: "من مكونات السلوك الأساسية الجانب المعرفي والجانب الحركي والجانب الانفعالي؟", options: ["صح", "خطأ"], answer: "صح" },
    { q: "السلوك هو الاستجابات والأفعال الظاهرة فقط؟", options: ["صح", "خطأ"], answer: "خطأ" },
    { q: "من خطوات تعديل السلوك عند سكينر تصميم الخطة؟", options: ["صح", "خطأ"], answer: "صح" },
    { q: "من خطوات بناء الشخصية القوية التواصل الفعال؟", options: ["صح", "خطأ"], answer: "صح" },
    { q: "هناك عوامل تساعد على بناء الهوية الشخصية منها عوامل ثقافية واجتماعية؟", options: ["صح", "خطأ"], answer: "صح" }
];

let currentQuestion = 0, score = 0, lives = 3, streak = 0, timerInterval = null;
const totalQuestions = questions.length;
let passwordAttempts = 3;
const correctPassword = "258147";

const backgrounds = [
    "https://videos.pexels.com/video-files/1851190/1851190-hd_1920_1080_30fps.mp4",
    "https://videos.pexels.com/video-files/854/854-hd_1920_1080_30fps.mp4",
    "https://videos.pexels.com/video-files/319/319-hd_1920_1080_30fps.mp4"
];

function initBackgrounds() {
    const container = document.getElementById('video-container');
    backgrounds.forEach((src, i) => {
        const v = document.createElement('video');
        v.src = src;
        v.loop = true;
        v.muted = true;
        v.playsInline = true;
        if (i === 0) v.classList.add('active');
        container.appendChild(v);
        v.load();
    });
}

function changeBackground() {
    const videos = document.querySelectorAll('#video-container video');
    videos.forEach(v => v.classList.remove('active'));
    const next = (Array.from(videos).findIndex(v => v.classList.contains('active')) + 1) % videos.length || 0;
    videos[next].classList.add('active');
}

function startMusic() {
    document.getElementById('bgMusic').volume = 0.25;
    document.getElementById('bgMusic').play().catch(()=>{});
}

function checkPassword() {
    const input = document.getElementById('pass-input').value.trim();
    const error = document.getElementById('error-msg');
    const attemptsEl = document.getElementById('attempts-count');

    if (input === correctPassword) {
        document.getElementById('password-screen').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('password-screen').style.display = 'none';
            document.getElementById('quiz-card').style.display = 'block';
            initBackgrounds();
            startMusic();
            setInterval(changeBackground, 18000);
            startQuiz();
        }, 800);
    } else {
        passwordAttempts--;
        attemptsEl.textContent = passwordAttempts;
        error.textContent = passwordAttempts > 0 ? `خطأ! ${passwordAttempts} محاولات متبقية` : '🚫 تم حظرك';
    }
}

function startQuiz() {
    currentQuestion = 0; score = 0; lives = 3; streak = 0;
    document.getElementById('main-btn').style.display = 'none';
    loadQuestion();
}

function loadQuestion() {
    if (currentQuestion >= totalQuestions) return endQuiz();

    const q = questions[currentQuestion];
    document.getElementById('progress').style.width = `${((currentQuestion) / totalQuestions) * 100}%`;
    document.getElementById('level').textContent = `مستوى ${Math.floor(currentQuestion / 5) + 1}`;
    document.getElementById('hearts').innerHTML = '❤️'.repeat(lives);
    document.getElementById('streak').innerHTML = `🔥 ${streak}`;

    document.getElementById('question').innerHTML = `
        <span style="font-size:0.95rem; opacity:0.8;">سؤال ${currentQuestion + 1}/${totalQuestions}</span><br>
        ${q.q}
    `;

    let html = '';
    q.options.forEach((opt, i) => {
        html += `<div class="option" onclick="selectAnswer(this, '${opt}', '${q.answer}')">${String.fromCharCode(65 + i)}. ${opt}</div>`;
    });
    document.getElementById('options').innerHTML = html;

    startTimer();
}

function stopTimer() {
    if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
    }
}

function startTimer() {
    stopTimer();

    let timeLeft = 15;
    const timeSpan = document.getElementById('time-left');
    const timerBox = document.getElementById('timer');

    timerBox.style.display = 'block';
    timeSpan.textContent = timeLeft;
    timeSpan.style.color = '#f59e0b';

    timerInterval = setInterval(() => {
        timeLeft--;
        timeSpan.textContent = timeLeft;

        if (timeLeft <= 5) {
            timeSpan.style.color = '#ef4444';
        }

        if (timeLeft <= 0) {
            stopTimer();
            timeOut();
        }
    }, 1000);
}

function selectAnswer(element, selected, correct) {
    stopTimer();
    document.getElementById('timer').style.display = 'none';
    document.querySelectorAll('.option').forEach(opt => opt.style.pointerEvents = 'none');

    if (selected === correct) {
        element.classList.add('correct');
        score += 10 + (streak * 5);
        streak++;
        document.getElementById('correctSound').play().catch(()=>{});
        createConfetti(60);
    } else {
        element.classList.add('wrong');
        lives--;
        streak = 0;
        document.getElementById('wrongSound').play().catch(()=>{});
        document.querySelectorAll('.option').forEach(opt => {
            if (opt.textContent.includes(correct)) opt.classList.add('correct');
        });
    }

    document.getElementById('hearts').innerHTML = '❤️'.repeat(lives);
    document.getElementById('streak').innerHTML = `🔥 ${streak}`;

    setTimeout(() => {
        currentQuestion++;
        loadQuestion();
    }, 1550);
}

function timeOut() {
    lives--;
    streak = 0;
    document.getElementById('hearts').innerHTML = '❤️'.repeat(lives);
    document.getElementById('wrongSound').play().catch(()=>{});
    
    const q = questions[currentQuestion];
    document.querySelectorAll('.option').forEach(opt => {
        if (opt.textContent.includes(q.answer)) opt.classList.add('correct');
        opt.style.pointerEvents = 'none';
    });

    setTimeout(() => { currentQuestion++; loadQuestion(); }, 1400);
}

function createConfetti(count) {
    const emojis = ['🌟','✨','🔥','💎','🦍','⚡'];
    for (let i = 0; i < count; i++) {
        const c = document.createElement('div');
        c.className = 'confetti';
        c.textContent = emojis[Math.floor(Math.random()*emojis.length)];
        c.style.left = Math.random() * 100 + 'vw';
        c.style.top = '-50px';
        c.style.animationDuration = (Math.random() * 2.5 + 3) + 's';
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 6000);
    }
}

function endQuiz() {
    stopTimer();

    const percentage = Math.round((score / (totalQuestions * 15)) * 100);
    let message = percentage >= 85 ? '👑 أنت أسطورة MONSTER QUIZ!' : 
                  percentage >= 70 ? '🏆 وحش حقيقي!' : 
                  percentage >= 50 ? '💪 أداء ممتاز' : '🔄 حاول تاني يا بطل';

    document.getElementById('question').innerHTML = `
        <h2 style="font-size:2.4rem;margin:15px 0;">🎉 انتهت المغامرة!</h2>
        <p style="font-size:3rem; color:#67e8f9; margin:10px 0;">${score} نقطة</p>
        <p style="font-size:1.8rem;">${percentage}%</p>
        <p style="margin:20px 0; font-size:1.4rem;">${message}</p>
    `;
    document.getElementById('options').innerHTML = `
        <button onclick="location.reload()" style="margin:15px 0;">🎮 العب مرة أخرى</button>
        <button onclick="navigator.share({title:'MONSTER QUIZ', text:'سجلت ${score} نقطة!'}).catch(()=>{})" style="background:#8b5cf6;">📤 شارك النتيجة</button>
    `;
}

function toggleMusic() {
    const music = document.getElementById('bgMusic');
    music.paused ? music.play() : music.pause();
}

function toggleFullscreen() {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
}
