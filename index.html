<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 Monster Quiz</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<style>
body {
    margin:0;
    font-family:'Cairo',sans-serif;
    background: radial-gradient(circle at 50% 20%, #1e2937, #020617);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
}

.card {
    width:420px;
    padding:30px;
    border-radius:20px;
    background: rgba(15,23,42,0.9);
}

button {
    padding:15px;
    width:100%;
    margin-top:10px;
    border:none;
    border-radius:12px;
    background:linear-gradient(45deg,#22c55e,#06b6d4);
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.option {
    background:#1e293b;
    margin:10px 0;
    padding:12px;
    border-radius:10px;
    cursor:pointer;
}

.correct { background:#22c55e !important; }
.wrong { background:#ef4444 !important; }
</style>
</head>

<body>

<div class="card" id="passwordScreen">
    <h2>🔒 ادخل الباسورد</h2>
    <input id="pass" type="password" style="padding:10px;width:100%;border-radius:10px;">
    <button onclick="checkPass()">دخول</button>
    <p id="err" style="color:red;"></p>
</div>

<div class="card" id="game" style="display:none;">
    <div id="timer">20</div>
    <div id="question"></div>
    <button onclick="next()">تأكيد</button>
    <p id="result"></p>
</div>

<script>

const PASSWORD = "الدفعة الفقرية";

function checkPass(){
    if(document.getElementById("pass").value === PASSWORD){
        document.getElementById("passwordScreen").style.display="none";
        document.getElementById("game").style.display="block";
        load();
    } else {
        document.getElementById("err").innerText="❌ غلط!";
    }
}

let qIndex=0;
let score=0;
let selected=null;

let questions=[
    {q:"عاصمة مصر؟", o:["القاهرة","الجيزة","أسوان"], a:"القاهرة"},
    {q:"2+2؟", o:["4","5","3"], a:"4"},
    {q:"مين مؤسس فيسبوك؟", o:["مارك","بيل","إيلون"], a:"مارك"}
];

function load(){
    if(qIndex>=questions.length) return end();

    let q=questions[qIndex];
    let html=`<h3>${q.q}</h3>`;

    q.o.forEach(o=>{
        html+=`<div class="option" onclick="select(this)">${o}</div>`;
    });

    document.getElementById("question").innerHTML=html;
    selected=null;
}

function select(el){
    document.querySelectorAll(".option").forEach(o=>o.style.border="none");
    el.style.border="2px solid cyan";
    selected=el.innerText;
}

function next(){
    if(!selected) return;

    let q=questions[qIndex];
    let correct = selected === q.a;

    document.querySelectorAll(".option").forEach(opt=>{
        if(opt.innerText === q.a) opt.classList.add("correct");
        if(opt.innerText === selected && !correct) opt.classList.add("wrong");
    });

    if(correct){
        score++;
        confetti({ particleCount:150, spread:80 });
    }

    setTimeout(()=>{
        qIndex++;
        load();
    },1000);
}

function end(){
    let percent = Math.round((score/questions.length)*100);

    let msg = "👍 كويس";
    if(percent===100){
        msg="👑 أسطورة!!!";
        confetti({ particleCount:400, spread:180 });
    }
    else if(percent>=80) msg="🔥 جامد جدًا";
    else if(percent>=70) msg="⭐ شاطر يا بطل";

    document.getElementById("game").innerHTML=`
        <h1>${percent}%</h1>
        <h2>${msg}</h2>
        <button onclick="location.reload()">🔄 إعادة</button>
    `;
}

</script>

</body>
</html>
