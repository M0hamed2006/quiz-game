<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌧️ Monster Quiz - Calm Mode</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Cairo', sans-serif;
    color: white;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    background: #000;
}

/* السماء */
body::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(270deg,
        #0f2027,
        #203a43,
        #2c5364,
        #ff7e5f,
        #feb47b,
        #0f2027
    );
    background-size: 1200% 1200%;
    animation: skyShift 80s ease infinite;
    z-index: -5;
}

/* الكاميرا الطايرة */
body::after {
    content: '';
    position: absolute;
    inset: 0;
    background: url('https://picsum.photos/1920/1080?blur=2') center/cover no-repeat;
    opacity: 0.5;
    filter: brightness(0.7);
    animation: flyCamera 120s linear infinite;
    z-index: -4;
}

/* الضباب */
.fog {
    position: absolute;
    inset: 0;
    background: radial-gradient(circle, rgba(255,255,255,0.08), transparent 70%);
    animation: fogMove 60s linear infinite;
    z-index: -3;
}

/* المطر */
.rain {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
        transparent,
        transparent 3px,
        rgba(200,240,255,0.15) 4px
    );
    animation: rainFall 0.7s linear infinite;
    z-index: -2;
}

/* الأنيميشن */
@keyframes skyShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

@keyframes flyCamera {
    0% { background-position: 20% 50%; }
    50% { background-position: 80% 50%; }
    100% { background-position: 20% 50%; }
}

@keyframes fogMove {
    0% { transform: translateX(-10%); }
    100% { transform: translateX(10%); }
}

@keyframes rainFall {
    from { background-position: 0 0; }
    to { background-position: 0 150px; }
}

/* الكارت */
.card {
    background: rgba(15,20,40,0.85);
    backdrop-filter: blur(25px);
    padding: 20px;
    border-radius: 20px;
    width: 90%;
    max-width: 380px;
    text-align: center;
    box-shadow: 0 0 40px rgba(165,243,252,0.2);
}

h1 {
    font-weight: 900;
    background: linear-gradient(90deg,#a5f3fc,#c4b5fd,#f9a8d4);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.option {
    background: rgba(30,40,65,0.9);
    padding: 10px;
    margin: 6px 0;
    border-radius: 12px;
    cursor: pointer;
}

.option:hover {
    border: 2px solid #67e8f9;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(45deg,#22c55e,#38bdf8);
    color: white;
    font-weight: bold;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="rain"></div>
<div class="fog"></div>

<div class="card">
    <h1>🌧️ Monster Quiz</h1>
    <p id="question">اضغط ابدأ</p>
    <div id="answers"></div>
    <button onclick="startGame()">ابدأ</button>
</div>

<script>
let questions = [
    {q:"عاصمة مصر؟",o:["القاهرة","الجيزة","أسوان"],a:"القاهرة"},
    {q:"2+2؟",o:["4","5","3"],a:"4"}
];

let index = 0;

function startGame(){
    loadQuestion();
}

function loadQuestion(){
    if(index>=questions.length){
        document.getElementById("question").innerText="خلصت 🔥";
        document.getElementById("answers").innerHTML="";
        return;
    }

    let q=questions[index];
    document.getElementById("question").innerText=q.q;

    let html="";
    q.o.forEach(op=>{
        html+=`<div class="option" onclick="next()">${op}</div>`;
    });

    document.getElementById("answers").innerHTML=html;
}

function next(){
    index++;
    loadQuestion();
}
</script>

</body>
</html>
