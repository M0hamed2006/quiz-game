<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌌 MONSTER QUIZ LEGEND - الأسطورة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --glow: #67e8f9; }
        * { box-sizing: border-box; margin:0; padding:0; }
       
        html, body {
            width: 100%;
            min-height: 100%;
        }

        body {
            margin: 0;
            font-family: 'Cairo', sans-serif;
            color: white;
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
            overflow-y: auto;
            background: #000;
            position: relative;
            -webkit-text-size-adjust: 100%;
        }

        #video-container {
            position: fixed;
            inset: 0;
            z-index: -10;
            overflow: hidden;
            pointer-events: none;
        }
        #video-container video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 2.8s ease-in-out;
        }
        #video-container video.active {
            opacity: 1;
        }

        #image-overlay {
            position: fixed;
            inset: 0;
            z-index: -9;
            background-size: cover;
            background-position: center;
            opacity: 0.25;
            transition: all 3s ease;
            pointer-events: none;
        }

        #password-screen {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(15, 23, 42, 0.96);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            backdrop-filter: blur(25px);
            padding: 16px;
        }

        .password-card {
            background: rgba(15, 23, 42, 0.95);
            padding: 50px 40px;
            border-radius: 30px;
            width: 92%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 0 90px rgba(103, 232, 249, 0.7);
            border: 2px solid rgba(103, 232, 249, 0.5);
        }

        input {
            width: 100%;
            padding: 18px;
            font-size: 1.5rem;
            text-align: center;
            border-radius: 20px;
            border: 3px solid #67e8f9;
            background: rgba(30, 41, 59, 0.95);
            color: white;
            margin: 20px 0;
            outline: none;
        }

        .card {
            position: relative;
            z-index: 10;
            background: rgba(15, 23, 42, 0.55); /* 👈 التعديل هنا */
            backdrop-filter: blur(35px);
            border-radius: 32px;
            width: min(94%, 480px);
            margin: 20px auto;
            padding: 35px 25px;
            box-shadow: 0 0 90px rgba(103, 232, 249, 0.6);
            text-align: center;
        }

        @media (max-width: 600px) {
            .card {
                padding: 20px 14px;
                width: calc(100% - 16px);
                border-radius: 22px;
                margin: 10px auto 18px;
            }

            .password-card {
                padding: 26px 16px;
                width: 100%;
                border-radius: 22px;
            }

            h1 { font-size: 1.65rem !important; }
            #question { font-size: 1.05rem !important; }
            .option { padding: 13px 12px; font-size: 1rem; }
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(90deg, #67e8f9, #c084fc, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .option {
            background: rgba(30, 41, 59, 0.95);
            padding: 20px;
            margin: 12px 0;
            border-radius: 22px;
            font-size: 1.25rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            border: 3px solid transparent;
        }

        .option:hover { transform: translateY(-6px) scale(1.04); box-shadow: 0 0 30px var(--glow); }
        .option.correct { background: #22c55e !important; }
        .option.wrong { background: #ef4444 !important; }

        #red-flash {
            position: fixed;
            inset: 0;
            background: rgba(239, 68, 68, 0.6);
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s;
        }
    </style>
</head>

<body>

<div id="video-container"></div>
<div id="image-overlay"></div>

<div id="password-screen">
    <div class="password-card">
        <h1>🔑 MONSTER QUIZ</h1>
        <input type="password" id="pass-input" maxlength="6">
        <button onclick="checkPassword()">دخول</button>
    </div>
</div>

<div class="card" id="quiz-card" style="display:none;">
    <h1>🌌 MONSTER QUIZ</h1>
    <p id="question"></p>
    <div id="options"></div>
</div>

<div id="red-flash"></div>

<script>
const questions = [
    { q: "عاصمة مصر؟", options: ["القاهرة","الجيزة","أسوان","الإسكندرية"], answer:"القاهرة"}
];

function checkPassword(){
    if(document.getElementById('pass-input').value==="258147"){
        document.getElementById('password-screen').style.display="none";
        document.getElementById('quiz-card').style.display="block";
        loadQuestion();
    }
}

function loadQuestion(){
    const q = questions[0];
    document.getElementById('question').innerText = q.q;
    document.getElementById('options').innerHTML = q.options.map(opt =>
        `<div class="option">${opt}</div>`
    ).join('');
}
</script>

</body>
</html>
