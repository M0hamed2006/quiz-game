<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>⚡ ورينا شطارتك</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #020617, #000);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

.container {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  padding: 25px;
  border-radius: 20px;
  width: 370px;
  box-shadow: 0 0 40px rgba(0,0,0,0.8);
  text-align: center;
  animation: float 3s infinite ease-in-out;
}

@keyframes float {
  0%,100% {transform: translateY(0);}
  50% {transform: translateY(-10px);}
}

input {
  padding: 10px;
  border-radius: 8px;
  border: none;
  width: 90%;
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(45deg, #22c55e, #06b6d4);
  color: white;
  font-size: 16px;
  cursor: pointer;
}

.option {
  display: block;
  background: #1e293b;
  padding: 10px;
  margin: 8px 0;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s;
}

.option:hover {
  transform: scale(1.05);
}

.correct {
  background: #22c55e !important;
  animation: pulse 0.5s;
}

.wrong {
  background: #ef4444 !important;
  animation: shake 0.5s;
}

@keyframes pulse {
  0% {transform: scale(1);}
  50% {transform: scale(1.1);}
  100% {transform: scale(1);}
}

@keyframes shake {
  0%,100% {transform: translateX(0);}
  25% {transform: translateX(-5px);}
  50% {transform: translateX(5px);}
}

#timerBar {
  height: 8px;
  background: #22c55e;
  margin-bottom: 10px;
  transition: 1s linear;
}

.star {
  position: fixed;
  top: -20px;
  font-size: 20px;
  animation: fall 3s linear;
}

@keyframes fall {
  to {
    transform: translateY(100vh);
    opacity: 0;
  }
}

</style>
</head>

<body>

<div class="container">

<div id="start">
  <h2>🎮 اكتب اسمك</h2>
  <input id="playerName">
  <button onclick="startGame()">ابدأ</button>
</div>

<div id="game" style="display:none;">
  <div id="timer">⏱️ 20</div>
  <div id="timerBar"></div>

  <div id="quiz"></div>
  <button onclick="checkAnswer()">تأكيد</button>

  <p id="result"></p>
  <div id="leaderboard"></div>
</div>

</div>

<script>

let correctSound = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");
let wrongSound = new Audio("https://www.soundjay.com/buttons/sounds/button-10.mp3");
let winSound = new Audio("https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3");

const questions = [
  {question:"عاصمة مصر؟", options:["القاهرة","الفيوم","أسوان"], answer:"القاهرة"},
  {question:"2+2؟", options:["3","4","5"], answer:"4"},
  {question:"مؤسس مايكروسوفت؟", options:["بيل جيتس","ستيف جوبز"], answer:"بيل جيتس"}
];

let current=0, score=0, timer, timeLeft=20;
let scores = JSON.parse(localStorage.getItem("scores")) || [];

function startGame(){
  playerName=document.getElementById("playerName").value;
  document.getElementById("start").style.display="none";
  document.getElementById("game").style.display="block";
  showQuestion();
}

function startTimer(){
  clearInterval(timer);
  timeLeft=20;

  timer=setInterval(()=>{
    timeLeft--;
    document.getElementById("timer").innerText="⏱️ "+timeLeft;

    document.getElementById("timerBar").style.width=(timeLeft*5)+"%";

    if(timeLeft<=0){
      checkAnswer();
    }
  },1000);
}

function showQuestion(){
  let q=questions[current];
  let html=`<div>${q.question}</div>`;

  q.options.forEach(o=>{
    html+=`<label class="option">
      <input type="radio" name="opt" value="${o}"> ${o}
    </label>`;
  });

  document.getElementById("quiz").innerHTML=html;
  startTimer();
}

function checkAnswer(){
  clearInterval(timer);

  let selected=document.querySelector('input[name="opt"]:checked');

  let options=document.querySelectorAll(".option");

  if(selected && selected.value===questions[current].answer){
    score++;
    correctSound.play();
    options.forEach(o=>o.classList.add("correct"));
    launchStars();
  }else{
    wrongSound.play();
    options.forEach(o=>o.classList.add("wrong"));
  }

  current++;

  setTimeout(()=>{
    if(current<questions.length){
      showQuestion();
    }else{
      showFinal();
    }
  },1200);
}

function launchStars(){
  for(let i=0;i<25;i++){
    let star=document.createElement("div");
    star.innerText="⭐";
    star.className="star";
    star.style.left=Math.random()*window.innerWidth+"px";
    document.body.appendChild(star);

    setTimeout(()=>star.remove(),3000);
  }
}

function showFinal(){
  winSound.play();

  scores.push({name:playerName, score:score});
  localStorage.setItem("scores", JSON.stringify(scores));

  document.getElementById("result").innerText=
    "🎯 نتيجتك: "+score;

  showLeaderboard();
}

function showLeaderboard(){
  scores.sort((a,b)=>b.score-a.score);

  let html="<h3>🏆 الترتيب</h3>";
  scores.forEach((s,i)=>{
    html+=`<p>${i+1}. ${s.name} - ${s.score}</p>`;
  });

  document.getElementById("leaderboard").innerHTML=html;
}

</script>

</body>
</html>
