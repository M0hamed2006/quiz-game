<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌌 MONSTER QUIZ LEGEND - الأسطورة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --glow: #67e8f9; }
        * { box-sizing: border-box; margin:0; padding:0; }
       
        html, body {
            width: 100%;
            min-height: 100%;
        }

        body {
            margin: 0;
            font-family: 'Cairo', sans-serif;
            color: white;
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
            overflow-y: auto;
            background: #000;
            position: relative;
            -webkit-text-size-adjust: 100%;
        }

        #video-container {
            position: fixed;
            inset: 0;
            z-index: -10;
            overflow: hidden;
            pointer-events: none;
        }
        #video-container video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 2.8s ease-in-out;
        }
        #video-container video.active {
            opacity: 1;
        }

        #image-overlay {
            position: fixed;
            inset: 0;
            z-index: -9;
            background-size: cover;
            background-position: center;
            opacity: 0.25;
            transition: all 3s ease;
            pointer-events: none;
        }

        #password-screen {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(15, 23, 42, 0.96);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            backdrop-filter: blur(25px);
            padding: 16px;
        }
        .password-card {
            background: rgba(15, 23, 42, 0.95);
            padding: 50px 40px;
            border-radius: 30px;
            width: 92%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 0 90px rgba(103, 232, 249, 0.7);
            border: 2px solid rgba(103, 232, 249, 0.5);
        }
        input {
            width: 100%;
            padding: 18px;
            font-size: 1.5rem;
            text-align: center;
            border-radius: 20px;
            border: 3px solid #67e8f9;
            background: rgba(30, 41, 59, 0.95);
            color: white;
            margin: 20px 0;
            outline: none;
        }

        .card {
            position: relative;
            z-index: 10;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(35px);
            border-radius: 32px;
            width: min(94%, 480px);
            margin: 20px auto;
            padding: 35px 25px;
            box-shadow: 0 0 90px rgba(103, 232, 249, 0.6);
            text-align: center;
        }

        @media (max-width: 600px) {
            .card {
                padding: 20px 14px;
                width: calc(100% - 16px);
                border-radius: 22px;
                margin: 10px auto 18px;
            }

            .password-card {
                padding: 26px 16px;
                width: 100%;
                border-radius: 22px;
            }

            h1 {
                font-size: 1.65rem !important;
                line-height: 1.2;
            }

            #question {
                font-size: 1.05rem !important;
                min-height: 72px !important;
                margin: 18px 0 !important;
                line-height: 1.45 !important;
            }

            .option {
                padding: 13px 12px;
                font-size: 1rem;
                margin: 8px 0;
                border-radius: 16px;
                line-height: 1.4;
            }

            input {
                font-size: 1.1rem;
                padding: 14px;
                border-radius: 16px;
            }

            #password-screen {
                padding: 12px;
            }

            #main-btn {
                padding: 16px !important;
                font-size: 1.15rem !important;
            }

            #timer {
                font-size: 1.25rem !important;
                margin: 12px 0 !important;
            }
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(90deg, #67e8f9, #c084fc, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .option {
            background: rgba(30, 41, 59, 0.95);
            padding: 20px;
            margin: 12px 0;
            border-radius: 22px;
            font-size: 1.25rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            border: 3px solid transparent;
            word-break: break-word;
        }
        .option:hover { transform: translateY(-6px) scale(1.04); box-shadow: 0 0 30px var(--glow); }
        .option.correct { background: #22c55e !important; border-color: #86efac; }
        .option.wrong { background: #ef4444 !important; border-color: #f87171; }

        .confetti {
            position: absolute;
            font-size: 1.8rem;
            animation: confetti-fall 4s linear forwards;
            z-index: 999;
            pointer-events: none;
        }
        @keyframes confetti-fall {
            to { transform: translateY(120vh) rotate(720deg); opacity: 0; }
        }

        #red-flash {
            position: fixed;
            inset: 0;
            background: rgba(239, 68, 68, 0.6);
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s;
        }
    </style>
</head>
<body>

    <div id="video-container"></div>
    <div id="image-overlay"></div>

    <!-- شاشة الباسورد -->
    <div id="password-screen">
        <div class="password-card">
            <h1>🔑 MONSTER QUIZ LEGEND</h1>
            <p style="font-size:1.4rem; margin:25px 0;">أدخل كلمة السر للدخول إلى العالم الأسطوري</p>
            <input type="password" id="pass-input" placeholder="••••••" maxlength="6">
            <div style="color:#f59e0b; font-size:1.3rem; margin:15px 0;">المحاولات المتبقية: <strong id="attempts-count">3</strong></div>
            <button onclick="checkPassword()" style="width:100%; padding:18px; font-size:1.4rem;">دخول</button>
            <p id="error-msg" style="color:#ef4444; margin-top:20px; min-height:30px;"></p>
        </div>
    </div>

    <!-- الكويز -->
    <div class="card" id="quiz-card" style="display:none;">
        <h1>🌌 MONSTER QUIZ LEGEND</h1>
       
        <div style="display:flex; justify-content:space-between; font-size:1.3rem; margin:15px 0;">
            <div id="level" style="background:#eab308;color:#000;padding:6px 20px;border-radius:9999px;font-weight:900;">مستوى ١</div>
            <div id="hearts" style="font-size:2.2rem;">❤️❤️❤️</div>
            <div id="streak" style="background:#eab308;color:#000;padding:6px 20px;border-radius:9999px;font-weight:900;">🔥 0 ستريك</div>
        </div>

        <div class="progress" style="height:10px;background:rgba(255,255,255,0.1);border-radius:9999px;overflow:hidden;margin:15px 0;">
            <div id="progress" style="height:100%;background:linear-gradient(90deg,#67e8f9,#c084fc);width:0%;transition:width 0.8s;"></div>
        </div>

        <p id="question" style="font-size:1.45rem; min-height:85px; margin:25px 0; font-weight:700;"></p>
       
        <div id="options"></div>
        <div id="timer" style="font-size:1.6rem; color:#f59e0b; font-weight:900; margin:15px 0; display:none;">⏳ <span id="time-left">15</span></div>
        
        <button id="main-btn" style="width:100%;padding:20px;font-size:1.5rem;font-weight:900;margin-top:10px;background:linear-gradient(45deg,#22c55e,#a78bfa);">ابدأ التحدي الوحشي 🔥</button>
       
        <p id="score-display" style="margin-top:20px;font-size:1.4rem;display:none;"></p>
    </div>

    <audio id="bgMusic" loop>
        <source src="https://www.chosic.com/wp-content/uploads/2023/05/relaxing-piano-music-for-video.mp3" type="audio/mpeg">
    </audio>

    <div id="red-flash"></div>

<script>
// ====================== 25 سؤال جاهزة ======================
const questions = [
    { q: "عاصمة مصر؟", options: ["القاهرة", "الجيزة", "أسوان", "الإسكندرية"], answer: "القاهرة" },
    { q: "5 + 5 = ؟", options: ["9", "10", "11", "12"], answer: "10" },
    { q: "أكبر وحش في الأساطير المصرية؟", options: ["أبو الهول", "التنين", "العفاريت", "الغول"], answer: "أبو الهول" },
    { q: "كم عدد أهرامات الجيزة الرئيسية؟", options: ["2", "3", "4", "5"], answer: "3" },
    { q: "أطول نهر في العالم؟", options: ["النيل", "الأمازون", "اليانغتسي", "المسيسيبي"], answer: "النيل" },
    { q: "لون دم الأخطبوط؟", options: ["أحمر", "أزرق", "أخضر", "أسود"], answer: "أزرق" },
    { q: "من هو توت عنخ آمون؟", options: ["ملك", "إله", "كاهن", "جنرال"], answer: "ملك" },
    { q: "أسرع حيوان في العالم؟", options: ["الفهد", "الصقر", "الأسد", "الغزال"], answer: "الفهد" },
    { q: "عدد كواكب المجموعة الشمسية؟", options: ["7", "8", "9", "10"], answer: "8" },
    { q: "عاصمة اليابان؟", options: ["بكين", "طوكيو", "سيول", "بانكوك"], answer: "طوكيو" },
    { q: "أي حيوان ينام واقفاً؟", options: ["الفيل", "الزرافة", "الأسد", "الدب"], answer: "الزرافة" },
    { q: "أكبر محيط في العالم؟", options: ["الأطلسي", "الهادئ", "الهندي", "المتجمد"], answer: "الهادئ" },
    { q: "مخترع المصباح الكهربائي؟", options: ["إديسون", "تسلا", "أينشتاين", "بيل"], answer: "إديسون" },
    { q: "أكبر مدينة في أفريقيا؟", options: ["القاهرة", "لاغوس", "كينشاسا", "جوهانسبرغ"], answer: "القاهرة" },
    { q: "عدد أضلاع المثلث؟", options: ["2", "3", "4", "5"], answer: "3" },
    { q: "أطول جبل في العالم؟", options: ["إيفرست", "كليمنجارو", "كا2", "كينشينجونغا"], answer: "إيفرست" },
    { q: "لون غير موجود في قوس قزح؟", options: ["أزرق", "بني", "أحمر", "أصفر"], answer: "بني" },
    { q: "أول إنسان على القمر؟", options: ["نيل أرمسترونج", "باز ألدرين", "يوري غاغارين", "مايكل كولينز"], answer: "نيل أرمسترونج" },
    { q: "عدد أرجل العنكبوت؟", options: ["6", "8", "10", "12"], answer: "8" },
    { q: "عاصمة السعودية؟", options: ["جدة", "الرياض", "مكة", "المدينة"], answer: "الرياض" },
    { q: "ما هو الحيوان الذي يطير للخلف؟", options: ["الطائر الطنان", "النسر", "البومة", "الخفاش"], answer: "الطائر الطنان" },
    { q: "كم عدد ألوان قوس قزح؟", options: ["5", "6", "7", "8"], answer: "7" },
    { q: "أكبر حيوان بري؟", options: ["الفيل الأفريقي", "الزرافة", "الديناصور", "الحوت"], answer: "الفيل الأفريقي" },
    { q: "ما هي أقدم حضارة في التاريخ؟", options: ["المصرية", "السومرية", "الصينية", "الهندية"], answer: "المصرية" },
    { q: "أي كوكب يُسمى الكوكب الأحمر؟", options: ["المريخ", "الزهرة", "المشتري", "زحل"], answer: "المريخ" }
];

let currentQuestion = 0;
let score = 0;
let lives = 3;
let streak = 0;
let timerInterval = null;
let totalQuestions = questions.length;
let passwordAttempts = 3;
const correctPassword = "258147";

const backgrounds = [
    { src: "https://videos.pexels.com/video-files/1851190/1851190-hd_1920_1080_30fps.mp4" },
    { src: "https://videos.pexels.com/video-files/854/854-hd_1920_1080_30fps.mp4" },
    { src: "https://videos.pexels.com/video-files/319/319-hd_1920_1080_30fps.mp4" },
    { src: "https://videos.pexels.com/video-files/1851189/1851189-hd_1920_1080_30fps.mp4" },
    { src: "https://videos.pexels.com/video-files/1851191/1851191-hd_1920_1080_30fps.mp4" },
    { src: "https://videos.pexels.com/video-files/1851192/1851192-hd_1920_1080_30fps.mp4" }
];

function initBackgrounds() {
    const container = document.getElementById('video-container');
    backgrounds.forEach((bg, i) => {
        const v = document.createElement('video');
        v.src = bg.src;
        v.loop = true;
        v.muted = true;
        v.playsInline = true;
        if (i === 0) v.classList.add('active');
        container.appendChild(v);
        v.load();
    });
}

let bgIndex = 0;
function changeBackground() {
    const videos = document.querySelectorAll('#video-container video');
    if (videos.length === 0) return;
    videos.forEach(v => v.classList.remove('active'));
    bgIndex = (bgIndex + 1) % videos.length;
    videos[bgIndex].classList.add('active');

    const overlay = document.getElementById('image-overlay');
    overlay.style.opacity = 0;
    setTimeout(() => {
        overlay.style.backgroundImage = `url('https://picsum.photos/id/${300 + bgIndex}/1920/1080')`;
        overlay.style.opacity = 0.28;
    }, 1200);
}

function startMusic() {
    const music = document.getElementById('bgMusic');
    music.volume = 0.22;
    music.play().catch(() => {});
}

function checkPassword() {
    const input = document.getElementById('pass-input').value.trim();
    const error = document.getElementById('error-msg');
    const attemptsEl = document.getElementById('attempts-count');

    if (input === correctPassword) {
        document.getElementById('password-screen').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('password-screen').style.display = 'none';
            document.getElementById('quiz-card').style.display = 'block';
            initBackgrounds();
            startMusic();
            setInterval(changeBackground, 20000);
            startQuiz();
        }, 1000);
    } else {
        passwordAttempts--;
        attemptsEl.textContent = passwordAttempts;
        error.textContent = passwordAttempts > 0 ? `خطأ! ${passwordAttempts} محاولات متبقية` : '🚫 تم حظرك';
        if (passwordAttempts <= 0) {
            error.innerHTML = `<button onclick="location.reload()" style="margin-top:20px;padding:15px 30px;border-radius:9999px;background:#eab308;color:#000;">حاول مرة أخرى</button>`;
        }
    }
}

function startQuiz() {
    currentQuestion = 0;
    score = 0;
    lives = 3;
    streak = 0;
    document.getElementById('main-btn').style.display = 'none';
    document.getElementById('score-display').style.display = 'none';
    loadQuestion();
}

function loadQuestion() {
    if (currentQuestion >= totalQuestions) {
        endQuiz();
        return;
    }

    const q = questions[currentQuestion];
    document.getElementById('progress').style.width = `${((currentQuestion) / totalQuestions) * 100}%`;
    document.getElementById('level').textContent = `مستوى ${Math.floor(currentQuestion / 5) + 1}`;
    document.getElementById('hearts').innerHTML = '❤️'.repeat(lives);
    document.getElementById('streak').innerHTML = `🔥 ${streak} ستريك`;

    document.getElementById('question').innerHTML = `
        <span style="font-size:0.95rem; opacity:0.75;">سؤال ${currentQuestion + 1} / ${totalQuestions}</span><br>
        ${q.q}
    `;

    let html = '';
    q.options.forEach((opt, i) => {
        html += `<div class="option" onclick="selectAnswer(this, '${opt}', '${q.answer}')">${String.fromCharCode(65 + i)}. ${opt}</div>`;
    });
    document.getElementById('options').innerHTML = html;

    startTimer();
}

function startTimer() {
    clearInterval(timerInterval);
    let timeLeft = 15;
    const timerEl = document.getElementById('timer');
    const timeSpan = document.getElementById('time-left');
    timerEl.style.display = 'block';
    timeSpan.textContent = timeLeft;

    timerInterval = setInterval(() => {
        timeLeft--;
        timeSpan.textContent = timeLeft;
        if (timeLeft <= 5) timerEl.style.color = '#ef4444';
        if (timeLeft <= 0) timeOut();
    }, 1000);
}

function selectAnswer(element, selected, correct) {
    clearInterval(timerInterval);
    document.getElementById('timer').style.display = 'none';

    const allOptions = document.querySelectorAll('.option');
    allOptions.forEach(opt => opt.style.pointerEvents = 'none');

    if (selected === correct) {
        element.classList.add('correct');
        score += 10 + (streak * 4);
        streak++;
        createSpecialConfetti(80);
    } else {
        element.classList.add('wrong');
        lives--;
        streak = 0;
        flashRed();
        allOptions.forEach(opt => {
            if (opt.textContent.includes(correct)) opt.classList.add('correct');
        });
    }

    document.getElementById('hearts').innerHTML = '❤️'.repeat(lives);
    document.getElementById('streak').innerHTML = `🔥 ${streak} ستريك`;

    setTimeout(() => {
        currentQuestion++;
        loadQuestion();
    }, 1600);
}

function timeOut() {
    lives--;
    streak = 0;
    document.getElementById('hearts').innerHTML = '❤️'.repeat(lives);
    const allOptions = document.querySelectorAll('.option');
    allOptions.forEach(opt => opt.style.pointerEvents = 'none');
    const q = questions[currentQuestion];
    allOptions.forEach(opt => {
        if (opt.textContent.includes(q.answer)) opt.classList.add('correct');
    });

    setTimeout(() => {
        currentQuestion++;
        loadQuestion();
    }, 1400);
}

function createSpecialConfetti(count) {
    const emojis = ['⭐', '✨', '🎁', '🌟', '💎', '🔥'];
    for (let i = 0; i < count; i++) {
        const c = document.createElement('div');
        c.className = 'confetti';
        c.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        c.style.left = Math.random() * 100 + 'vw';
        c.style.top = '-50px';
        c.style.fontSize = (Math.random() * 1.5 + 1.8) + 'rem';
        c.style.animationDuration = (Math.random() * 3 + 3) + 's';
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 7000);
    }
}

function flashRed() {
    const flash = document.getElementById('red-flash');
    flash.style.opacity = '0.7';
    setTimeout(() => flash.style.opacity = '0', 400);
}

function endQuiz() {
    const percentage = Math.round((score / (totalQuestions * 13)) * 100);
    const highScore = localStorage.getItem('monsterHighScore') || 0;
    if (score > highScore) localStorage.setItem('monsterHighScore', score);

    let message = percentage >= 85 ? '👑 أنت أسطورة حقيقية!' : 
                  percentage >= 70 ? '🏆 أداء ممتاز يا وحش!' : 
                  percentage >= 50 ? '💪 كويس جداً، استمر!' : '🔄 حاول مرة تانية..';

    document.getElementById('question').innerHTML = `
        <h2 style="margin:0; font-size:2.2rem;">🎉 انتهت المغامرة!</h2>
        <p style="font-size:2.6rem; margin:20px 0; color:#67e8f9;">${score} نقطة</p>
        <p style="font-size:1.5rem;">${percentage}%</p>
        <p style="margin:15px 0;">${message}</p>
        <p style="font-size:1.2rem; opacity:0.8;">أعلى نتيجة: ${highScore} نقطة</p>
    `;
    
    document.getElementById('options').innerHTML = `<button onclick="location.reload()" style="margin-top:15px;">🎮 العب مرة أخرى</button>`;
    document.getElementById('score-display').style.display = 'none';
}

console.log('%c🌌 MONSTER QUIZ LEGEND جاهز ومُعدل بالكامل 🔥', 'color:#67e8f9;font-size:20px;font-weight:900;');
</script>
</body>
</html>
