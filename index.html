<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌌 MONSTER QUIZ LEGEND - الأسطورة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --glow: #67e8f9; }
        * { box-sizing: border-box; margin:0; padding:0; }
        
        body {
            margin: 0;
            font-family: 'Cairo', sans-serif;
            color: white;
            height: 100vh;
            overflow: hidden;
            background: #000;
            position: relative;
        }

        /* ====================== فيديوهات الخلفية ====================== */
        #video-container {
            position: absolute;
            inset: 0;
            z-index: -10;
            overflow: hidden;
        }
        #video-container video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 2.8s ease-in-out;
        }
        #video-container video.active {
            opacity: 1;
        }

        /* صور إضافية تتغير مع الألوان */
        #image-overlay {
            position: absolute;
            inset: 0;
            z-index: -9;
            background-size: cover;
            background-position: center;
            opacity: 0.25;
            transition: all 3s ease;
        }

        /* شاشة الباسورد */
        #password-screen {
            position: absolute;
            inset: 0;
            z-index: 100;
            background: rgba(15, 23, 42, 0.96);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            backdrop-filter: blur(25px);
        }
        .password-card {
            background: rgba(15, 23, 42, 0.95);
            padding: 50px 40px;
            border-radius: 30px;
            width: 92%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 0 90px rgba(103, 232, 249, 0.7);
            border: 2px solid rgba(103, 232, 249, 0.5);
        }
        input {
            width: 100%;
            padding: 18px;
            font-size: 1.5rem;
            text-align: center;
            border-radius: 20px;
            border: 3px solid #67e8f9;
            background: rgba(30, 41, 59, 0.95);
            color: white;
            margin: 20px 0;
        }

        /* الكارت الرئيسي */
        .card {
            position: relative;
            z-index: 10;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(35px);
            border-radius: 32px;
            width: 94%;
            max-width: 480px;
            margin: 20px auto;
            padding: 35px 25px;
            box-shadow: 0 0 90px rgba(103, 232, 249, 0.6);
            text-align: center;
        }

        @media (max-width: 600px) {
            .card { padding: 25px 18px; width: 96%; border-radius: 24px; }
            h1 { font-size: 2rem !important; }
            #question { font-size: 1.3rem !important; }
            .option { padding: 16px; font-size: 1.15rem; }
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(90deg, #67e8f9, #c084fc, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .option {
            background: rgba(30, 41, 59, 0.95);
            padding: 20px;
            margin: 12px 0;
            border-radius: 22px;
            font-size: 1.25rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            border: 3px solid transparent;
        }
        .option:hover { transform: translateY(-6px) scale(1.04); box-shadow: 0 0 30px var(--glow); }
        .option.correct { background: #22c55e !important; border-color: #86efac; }
        .option.wrong { background: #ef4444 !important; border-color: #f87171; }

        .confetti {
            position: absolute;
            font-size: 1.8rem;
            animation: confetti-fall 4s linear forwards;
            z-index: 999;
            pointer-events: none;
        }

        /* فلاش أحمر للإجابة الغلط */
        #red-flash {
            position: absolute;
            inset: 0;
            background: rgba(239, 68, 68, 0.6);
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s;
        }
    </style>
</head>
<body>

    <!-- فيديوهات + صور -->
    <div id="video-container"></div>
    <div id="image-overlay"></div>

    <!-- شاشة الباسورد -->
    <div id="password-screen">
        <div class="password-card">
            <h1>🔑 MONSTER QUIZ LEGEND</h1>
            <p style="font-size:1.4rem; margin:25px 0;">أدخل كلمة السر للدخول </p>
            <input type="password" id="pass-input" placeholder="••••••" maxlength="6">
            <div style="color:#f59e0b; font-size:1.3rem; margin:15px 0;">المحاولات المتبقية: <strong id="attempts-count">3</strong></div>
            <button onclick="checkPassword()" style="width:100%; padding:18px; font-size:1.4rem;">دخول</button>
            <p id="error-msg" style="color:#ef4444; margin-top:20px; min-height:30px;"></p>
        </div>
    </div>

    <!-- الكويز -->
    <div class="card" id="quiz-card" style="display:none;">
        <h1>🌌 MONSTER QUIZ LEGEND</h1>
        
        <div style="display:flex; justify-content:space-between; font-size:1.3rem; margin:15px 0;">
            <div id="level" style="background:#eab308;color:#000;padding:6px 20px;border-radius:9999px;font-weight:900;">مستوى ١</div>
            <div id="hearts" style="font-size:2.2rem;">❤️❤️❤️</div>
            <div id="streak" style="background:#eab308;color:#000;padding:6px 20px;border-radius:9999px;font-weight:900;">🔥 0 ستريك</div>
        </div>

        <div class="progress" style="height:10px;background:rgba(255,255,255,0.1);border-radius:9999px;overflow:hidden;margin:15px 0;">
            <div id="progress" style="height:100%;background:linear-gradient(90deg,#67e8f9,#c084fc);width:0%;transition:width 0.8s;"></div>
        </div>

        <p id="question" style="font-size:1.45rem; min-height:85px; margin:25px 0; font-weight:700;"></p>
        
        <div id="options"></div>

        <div id="timer" style="font-size:1.6rem; color:#f59e0b; font-weight:900; margin:15px 0; display:none;">⏳ <span id="time-left">15</span></div>

        <button id="main-btn" onclick="startQuiz()" style="width:100%;padding:20px;font-size:1.5rem;font-weight:900;margin-top:10px;background:linear-gradient(45deg,#22c55e,#a78bfa);">ابدأ التحدي الوحشي 🔥</button>
        
        <p id="score-display" style="margin-top:20px;font-size:1.4rem;display:none;"></p>
    </div>

    <!-- موسيقى هادئة -->
    <audio id="bgMusic" loop>
        <source src="https://www.chosic.com/wp-content/uploads/2023/05/relaxing-piano-music-for-video.mp3" type="audio/mpeg">
    </audio>

    <!-- فلاش أحمر -->
    <div id="red-flash"></div>

<script>
// ====================== بيانات اللعبة ======================
const questions = [ /* نفس 25 سؤال السابقة (مش هعيدها عشان الكود ما يطولش) */ 
    // ... (انسخ الأسئلة من الكود السابق هنا)
];

let currentQuestion = 0, score = 0, lives = 3, streak = 0, timerInterval, totalQuestions = questions.length;
let passwordAttempts = 3;
const correctPassword = "258147";

// ====================== فيديوهات + صور (عالية الجودة) ======================
const backgrounds = [
    { type: "video", src: "https://videos.pexels.com/video-files/1851190/1851190-hd_1920_1080_30fps.mp4", fallback: "مطر" },
    { type: "video", src: "https://videos.pexels.com/video-files/854/854-hd_1920_1080_30fps.mp4", fallback: "غروب" },
    { type: "video", src: "https://videos.pexels.com/video-files/319/319-hd_1920_1080_30fps.mp4", fallback: "ليل + قمر" },
    { type: "video", src: "https://videos.pexels.com/video-files/1851189/1851189-hd_1920_1080_30fps.mp4", fallback: "غابة" },
    { type: "video", src: "https://videos.pexels.com/video-files/1851191/1851191-hd_1920_1080_30fps.mp4", fallback: "زهور" },
    { type: "video", src: "https://videos.pexels.com/video-files/1851192/1851192-hd_1920_1080_30fps.mp4", fallback: "مطر + قمر" }
];

function initBackgrounds() {
    const container = document.getElementById('video-container');
    backgrounds.forEach((bg, i) => {
        if (bg.type === "video") {
            const v = document.createElement('video');
            v.src = bg.src;
            v.loop = true;
            v.muted = true;
            v.playsInline = true;
            if (i === 0) v.classList.add('active');
            container.appendChild(v);
            v.load();
        }
    });
}

let bgIndex = 0;
function changeBackground() {
    const videos = document.querySelectorAll('#video-container video');
    if (videos.length === 0) return;
    
    videos.forEach(v => v.classList.remove('active'));
    bgIndex = (bgIndex + 1) % videos.length;
    videos[bgIndex].classList.add('active');
    
    // تغيير طبقة الصور
    const overlay = document.getElementById('image-overlay');
    overlay.style.opacity = 0;
    setTimeout(() => {
        overlay.style.backgroundImage = `url('https://picsum.photos/id/${300 + bgIndex}/1920/1080')`;
        overlay.style.opacity = 0.25;
    }, 1500);
}

// ====================== موسيقى ======================
function startMusic() {
    const music = document.getElementById('bgMusic');
    music.volume = 0.22;
    music.play().catch(() => console.log("موسيقى بدأت بعد تفاعل"));
}

// ====================== باسورد ======================
function checkPassword() {
    const input = document.getElementById('pass-input').value.trim();
    const error = document.getElementById('error-msg');
    const attemptsEl = document.getElementById('attempts-count');

    if (input === correctPassword) {
        document.getElementById('password-screen').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('password-screen').style.display = 'none';
            document.getElementById('quiz-card').style.display = 'block';
            initBackgrounds();
            startMusic();
            setInterval(changeBackground, 20000); // تغيير كل 20 ثانية
            startQuiz();
        }, 1000);
    } else {
        passwordAttempts--;
        attemptsEl.textContent = passwordAttempts;
        error.textContent = passwordAttempts > 0 ? `خطأ! ${passwordAttempts} محاولات متبقية` : '🚫 تم حظرك';
        if (passwordAttempts <= 0) {
            error.innerHTML = `<button onclick="location.reload()" style="margin-top:20px;padding:15px 30px;border-radius:9999px;background:#eab308;color:#000;">حاول مرة أخرى</button>`;
        }
    }
}

// ====================== باقي الدوال (loadQuestion, selectAnswer, confetti, red flash, endQuiz...) ======================
// (نفس الدوال السابقة مع تحسينات)

function createSpecialConfetti(count) {
    const emojis = ['⭐', '✨', '🎁', '🌟', '💎', '🔥'];
    for (let i = 0; i < count; i++) {
        const c = document.createElement('div');
        c.className = 'confetti';
        c.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        c.style.left = Math.random() * 100 + 'vw';
        c.style.top = '-50px';
        c.style.fontSize = (Math.random() * 1.5 + 1.8) + 'rem';
        c.style.animationDuration = (Math.random() * 3 + 3) + 's';
        c.style.transform = `rotate(${Math.random() * 720}deg)`;
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 7000);
    }
}

function flashRed() {
    const flash = document.getElementById('red-flash');
    flash.style.opacity = '0.7';
    setTimeout(() => flash.style.opacity = '0', 400);
}

// في selectAnswer:
if (selected === q.answer) {
    element.classList.add('correct');
    score += 10 + (streak * 4);
    streak++;
    createSpecialConfetti(80);   // نجوم + هدايا كتير
} else {
    element.classList.add('wrong');
    lives--;
    streak = 0;
    flashRed();                  // نور أحمر + اهتزاز
    // ... باقي الكود
}

// نهاية اللعبة + حفظ أعلى نتيجة
function endQuiz() {
    const highScore = localStorage.getItem('monsterHighScore') || 0;
    if (score > highScore) localStorage.setItem('monsterHighScore', score);
    // ... باقي نهاية اللعبة مع عرض أعلى نتيجة
}

// ====================== بداية ======================
console.log('%c🌌 MONSTER QUIZ LEGEND v2.0 - أفخم كود في التاريخ 🔥', 'color:#67e8f9;font-size:24px;font-weight:900;');
</script>
</body>
</html>
